<td class="terminal-table-cell--output-path">
    {% if path %}
    <div class="terminal-output-path" title="{{ path }}">
        <span class="terminal-output-path__text">{{ path }}</span>
        <button
            type="button"
            class="terminal-output-path__copy"
            aria-label="Copy"
            title="Copy"
        >
            <svg
                xmlns="http://www.w3.org/2000/svg"
                width="11"
                height="11"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
            >
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
        </button>
    </div>
    {% else %}
    Pending
    {% endif %}
</td>
