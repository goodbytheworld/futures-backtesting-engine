{% if rows %}
<div class="terminal-table-wrap">
    <table class="terminal-table">
        <thead>
            <tr>
                {% for column in columns %}
                <th>
                    {% if enable_header_sort %}
                    <button
                        type="button"
                        class="terminal-table-sort{% if column == active_sort_column %} is-active{% endif %}"
                        data-sort-column="{{ column }}"
                        data-sort-tab="{{ sort_tab_id or '' }}"
                        data-sort-input-id="{{ sort_input_id or '' }}"
                    >
                        {{ column }}
                    </button>
                    {% else %}
                    {{ column }}
                    {% endif %}
                </th>
                {% endfor %}
            </tr>
        </thead>
        <tbody>
            {% for row in rows %}
            <tr>
                {% for column in columns %}
                <td>{{ row.get(column, "") }}</td>
                {% endfor %}
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% else %}
<div class="terminal-empty-state">{{ empty_message or "No data available." }}</div>
{% endif %}
