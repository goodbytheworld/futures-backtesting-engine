<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title or "Quant Terminal" }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='/terminal.css') }}?v={{ static_asset_version | default('1') }}">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
    {% block content %}{% endblock %}
    <div
        id="terminal-loading-overlay"
        class="terminal-loading-overlay"
        data-loading-words='{{ (loading_words | default(["Loading data", "Building correlations", "Syncing charts", "Computing metrics", "Finalizing view"])) | tojson }}'
        data-loading-word-interval-ms="{{ loading_word_interval_ms | default(1100) }}"
        data-loading-eta-per-request-seconds="{{ loading_eta_per_request_seconds | default(2.2) }}"
        aria-hidden="true"
    >
        <div class="terminal-loading-box">
            <div class="terminal-loading-spinner" aria-hidden="true"></div>
            <div id="terminal-loading-word" class="terminal-loading-word">Loading data</div>
            <div id="terminal-loading-eta" class="terminal-loading-eta">ETA ~--.-s</div>
        </div>
    </div>
    <script src="{{ url_for('static', path='/terminal.js') }}?v={{ static_asset_version | default('1') }}"></script>
    <script src="{{ url_for('static', path='/charts.js') }}?v={{ static_asset_version | default('1') }}"></script>
    <script src="{{ url_for('static', path='/operations.js') }}?v={{ static_asset_version | default('1') }}"></script>
</body>
</html>
