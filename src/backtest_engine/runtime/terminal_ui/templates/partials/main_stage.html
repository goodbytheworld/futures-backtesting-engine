<section class="terminal-panel terminal-panel--primary terminal-panel--with-mini">
    <div class="terminal-panel__header">
        <div>
            <h2>Main Equity</h2>
            <p>Primary chart loads first; lower panels hydrate after the first screen is usable.</p>
        </div>
        <div class="terminal-panel__controls">
            <label class="terminal-field terminal-field--inline">
                <input type="checkbox" id="toggle-benchmark" checked>
                <span>Show Benchmark</span>
            </label>
        </div>
    </div>
    <div
        class="terminal-chart terminal-chart--main"
        data-chart-renderer="equity"
        data-chart-endpoint="/api/charts/equity"
    ></div>
    <div
        class="terminal-chart terminal-chart--mini"
        data-chart-renderer="line"
        data-chart-endpoint="/api/charts/rolling-sharpe"
    ></div>
</section>
