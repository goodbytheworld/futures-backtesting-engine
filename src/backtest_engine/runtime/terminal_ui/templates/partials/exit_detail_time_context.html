<div class="exit-detail-view">
    <div class="exit-detail-view__header">
        <span>{{ exit_strategy_label }}</span>
    </div>
    <div class="terminal-split terminal-split--equal">
        <section class="terminal-chart-card">
            <div class="terminal-chart-card__header">
                <h4>Holding Time</h4>
            </div>
            <div
                class="terminal-chart terminal-chart--large"
                data-chart-renderer="bar"
                data-chart-endpoint="/api/charts/exit-holding-time?strategy={{ strategy_encoded }}"
            ></div>
        </section>
        <section class="terminal-chart-card">
            <div class="terminal-chart-card__header">
                <h4>Entry Volatility</h4>
            </div>
            <div
                class="terminal-chart terminal-chart--large"
                data-chart-renderer="bar"
                data-chart-endpoint="/api/charts/exit-vol-regime?strategy={{ strategy_encoded }}"
            ></div>
        </section>
    </div>
</div>
